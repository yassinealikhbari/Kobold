name: Job scan

on:
  schedule:
    - cron: '17 */3 * * *'
  workflow_dispatch:

concurrency:
  group: kobold-job-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Scan all sources and send one digest
        env:
          KOBOLD_APP_URL: https://kobold-gamma.vercel.app
          KOBOLD_CRON_SECRET: ${{ secrets.KOBOLD_CRON_SECRET }}
        run: |
          set -euo pipefail
          test -n "$KOBOLD_CRON_SECRET"
          curl --fail-with-body --silent --show-error \
            --max-time 110 \
            --retry 2 \
            --retry-all-errors \
            --request POST \
            --header "x-cron-secret: $KOBOLD_CRON_SECRET" \
            "$KOBOLD_APP_URL/api/ingest?source=all"
